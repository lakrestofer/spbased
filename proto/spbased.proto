syntax = "proto3";
package spbased;

// ==== services ====

service Scheduler {
  ListReviewItems ( ListReviewItemMessage ) returns (stream ReviewItem) {} // List
  GetReviewItem ( GetReviewItemMessage ) returns (ReviewItem) {} // Get
  CreateReviewItem ( CreateReviewItemMessage ) returns (ReviewItem) {} // Get
  // Update
  // Delete
  DeleteReviewItem ( DeleteReviewItemMessage ) returns (ReviewItem) {} // Get
}

// ==== message definitions ====
// all the message definitions

// *objects*

// new review item, has not been assigned a stability nor difficulty yet
message NewReviewItem {
  string name = 1; // e.g "flashcards/uuid" - this is apparently good practice for any larger system
  string create_time = 2;
  string update_time = 3;
  string url = 4;
  string data = 5;
  // maybe something like prioritization?
}

// review item
message ReviewItem {
  string name = 1; // e.g flashcards/uuid - this is apparently good practice for any larger system
  string create_time = 2; // when was this item created
  string update_time = 3; // when was this item updated last? (as in data field, not the difficulty or stability)
  float64 difficulty = 4; 
  float64 stability = 5;
  string last_review_date = 6;
  string url = 7;
  string data = 8;
}

// *request messages* 
// these define what information is passed with one of the above standard methods

message ListReviewItemsMessage {
  // options for paginated result
  string page_token = 1; // "" for first page, then use the returned page token
  int32 page_size = 2; // 0 for the server to decide
  // sorting
  string order_by = 3; // e.g sort first by update time, then by create time"update_time,create_time"
  bool asc = 4;
  // filters
  // to be continued...
}

message GetReviewItemMessage {
  string name = 1;
}

message CreateReviewItemMessage {
  NewReviewItem item = 1;
}

message DeleteReviewItemMessage {
  string name = 1;
}
