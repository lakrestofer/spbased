[workspace]

resolver = "2"

members = [
  "crates/*"
]

[workspace.dependencies]
# internal dependencies
entity = { path = "./crates/entity" }
migration = { path = "./crates/migration" }
grpc = { path = "./crates/grpc" }
api = { path = "./crates/api" }
common = { path = "./crates/common" }
algo = { path = "./crates/algo" }
# external dependencies
color-eyre = { version = "0.6" }
thiserror = { version = "1" }
anyhow = { version = "1.0" }
sea-orm = { version = "0.12", features = [
    "with-chrono",
    "sqlx-sqlite",
    "runtime-tokio-rustls",
    "macros",
    "with-uuid",
] }
chrono = { version = "0.4" }
uuid = { version = "1", features = [ "v4" ] }
serde_json = "1"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
tonic = "0.10"
tonic-build = "0.10"
prost = "0.12"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
tokio-stream = {version = "0.1", features = ["net"] }
tokio-util = { version = "0.7" }
futures = { version = "0.3" }
tower = { version = "0.4" }
tempfile = { version = "3.9" }
async-stream = "0.2"
directories = { version = "5" }
clap = { version = "4.4", features = ["derive", "cargo", "wrap_help", "unicode", "string", "unstable-styles"] }
ratatui = { version = "0.25", features = ["all-widgets", "serde", "macros"] }
crossterm = { version = "0.27.0", features = ["event-stream", "serde"] }
config = { version = "0.13" }

[workspace.metadata.local-install]
sea-orm-cli = "0.12.4"


